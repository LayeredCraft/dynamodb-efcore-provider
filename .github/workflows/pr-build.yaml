name: PR Build

on:
  pull_request:
    branches:
      - main
permissions: write-all
jobs:
  build:
    uses: LayeredCraft/devops-templates/.github/workflows/pr-build.yaml@v7.6
    with:
      solution: EntityFrameworkCore.DynamoDb.slnx
      hasTests: true
      useMtpRunner: true
      dotnetVersion: |
        10.0.x
      runCdk: false
    secrets: inherit