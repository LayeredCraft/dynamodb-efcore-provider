name: Publish Release

on:
  release:
    types: [published]

permissions: write-all

jobs:
  publish:
    uses: LayeredCraft/devops-templates/.github/workflows/publish-release.yml@feat/multi-version-support
    with:
      solution: EntityFrameworkCore.DynamoDb.slnx
      dotnetVersion: "10.0.x"   # fallback only — overridden when buildConfiguration=auto
      buildConfiguration: auto
      hasTests: true
    secrets: inherit
