[project]
site_name = "EntityFrameworkCore.DynamoDb"
site_description = "Entity Framework Core provider for AWS DynamoDB."
site_author = "LayeredCraft"
site_url = "https://layeredcraft.github.io/dynamodb-efcore-provider/"
repo_url = "https://github.com/LayeredCraft/dynamodb-efcore-provider"
repo_name = "LayeredCraft/dynamodb-efcore-provider"
edit_uri = "edit/main/docs/"
copyright = "Copyright &copy; 2026 LayeredCraft"
docs_dir = "docs"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "DynamoDB Concepts for EF Developers" = "dynamodb-concepts.md" },
  { "Configuration" = [
    { "Overview" = "configuration/index.md" },
    { "Client Setup" = "configuration/client-setup.md" },
    { "DbContext Options" = "configuration/dbcontext.md" },
    { "Table and Key Mapping" = "configuration/table-key-mapping.md" },
    { "Attribute Naming" = "configuration/attribute-naming.md" }
  ] },
  { "Data Modeling" = [
    { "Overview" = "modeling/index.md" },
    { "Entities and Keys" = "modeling/entities-keys.md" },
    { "Secondary Indexes" = "modeling/secondary-indexes.md" },
    { "Owned Types and Collections" = "modeling/owned-types.md" },
    { "Single-Table Design and Discriminators" = "modeling/single-table-design.md" }
  ] },
  { "Querying" = [
    { "Overview" = "querying/index.md" },
    { "How Queries Execute" = "querying/how-queries-execute.md" },
    { "Supported Operators" = "querying/operators.md" },
    { "Filtering" = "querying/filtering.md" },
    { "Projection" = "querying/projection.md" },
    { "Ordering and Limiting" = "querying/ordering-limiting.md" },
    { "Pagination" = "querying/pagination.md" },
    { "Index Selection" = "querying/index-selection.md" }
  ] },
  { "Saving Data" = [
    { "Overview" = "saving/index.md" },
    { "Add, Update, and Delete" = "saving/add-update-delete.md" },
    { "Transactions" = "saving/transactions.md" },
    { "Optimistic Concurrency" = "saving/concurrency.md" }
  ] },
  { "Diagnostics and Logging" = "diagnostics.md" },
  { "Limitations" = "limitations.md" }
]

[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.toc]
permalink = true
permalink_title = "Anchor link to this section"

[project.theme]
logo = "images/icon.png"
favicon = "images/icon.png"
features = [
  "navigation.footer",
  "navigation.indexes",
  "content.action.edit",
  "content.action.view",
  "content.code.copy",
  "content.code.select"
]

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.extra]
homepage = "https://github.com/LayeredCraft/dynamodb-efcore-provider"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/LayeredCraft/dynamodb-efcore-provider"
name = "LayeredCraft on GitHub"
